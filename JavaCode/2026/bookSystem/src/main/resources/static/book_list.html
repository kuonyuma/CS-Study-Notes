<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>图书管理系统 - 列表</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; }
        h2 { text-align: center; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .top-actions { margin-bottom: 15px; }
        .btn { padding: 8px 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; }
        .btn-danger { background-color: #dc3545; }
        .btn:hover { opacity: 0.8; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <h2>图书列表展示</h2>
        <div class="top-actions">
            <a href="book_add.html" class="btn">添加图书</a>
            <button class="btn btn-danger" onclick="batchDelete()">批量删除</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>选择</th>
                    <th>图书ID</th>
                    <th>书名</th>
                    <th>作者</th>
                    <th>数量</th>
                    <th>定价</th>
                    <th>出版社</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 数据由JS渲染 -->
            </tbody>
        </table>
    </div>

    <script>
        /**
         * 页面加载完成后的初始化操作
         */
        $(function () {
            // 页面一打开就调用函数从后端获取图书列表
            getBookList();
        });

        /**
         * 获取图书列表函数
         */
        function getBookList() {
            $.ajax({
                type: "get",           // 使用 GET 方式获取数据
                url: "/book/getList",   // 后端获取列表的接口
                success: function (result) {
                    // result 是后端返回的图书对象数组
                    if (result != null) {
                        var finalHtml = "";
                        // 遍历数组，将每一本书的信息拼接成表格行 (tr)
                        for (var book of result) {
                            finalHtml += '<tr>';
                            // 复选框，用于批量删除，value 绑定图书 ID
                            finalHtml += '<td><input type="checkbox" name="selectBook" value="' + book.id + '" class="book-select"></td>';
                            finalHtml += '<td>' + book.id + '</td>';
                            finalHtml += '<td>' + book.bookName + '</td>';
                            finalHtml += '<td>' + book.author + '</td>';
                            finalHtml += '<td>' + book.count + '</td>';
                            finalHtml += '<td>' + book.price + '</td>';
                            finalHtml += '<td>' + book.publish + '</td>';
                            finalHtml += '<td>' + book.statusCN + '</td>'; // statusCN 是后端处理好的状态文字（如“可借阅”）
                            finalHtml += '<td>';
                            // 修改链接：带上当前书的 ID 跳转到修改页面
                            finalHtml += '<a href="book_update.html?bookId=' + book.id + '">修改</a> | ';
                            // 删除链接：点击触发 deleteBook 函数
                            finalHtml += '<a href="javascript:void(0)" onclick="deleteBook(' + book.id + ')">删除</a>';
                            finalHtml += '</td>';
                            finalHtml += '</tr>';
                        }
                        // 将拼接好的 HTML 代码插入到 tbody 标签中
                        $("tbody").html(finalHtml);
                    }
                }
            });
        }

        /**
         * 删除单本图书函数
         * @param id 图书 ID
         */
        function deleteBook(id) {
            if (confirm("确定要删除吗？")) {
                $.ajax({
                    type: "post",
                    url: "/book/delete",
                    data: { bookId: id }, // 发送要删除的 ID
                    success: function (result) {
                        if (result) {
                            alert("删除成功！");
                            // 刷新列表显示最新数据
                            getBookList();
                        } else {
                            alert("删除失败！");
                        }
                    }
                });
            }
        }

        /**
         * 批量删除函数
         */
        function batchDelete() {
            var selectedIds = [];
            // 遍历所有被勾选的复选框，收集 ID
            $("input[name='selectBook']:checked").each(function () {
                selectedIds.push($(this).val());
            });

            if (selectedIds.length === 0) {
                alert("请先选择要删除的图书！");
                return;
            }

            if (confirm("确定要删除选中的 " + selectedIds.length + " 本书吗？")) {
                $.ajax({
                    type: "post",
                    url: "/book/batchDelete",
                    // 注意这里的键名 'ids' 与后端 @RequestParam("ids[]") 对应
                    // jQuery 默认会把数组转换成 ids[]=1&ids[]=2 的格式
                    data: { ids: selectedIds },
                    success: function (result) {
                        if (result) {
                            alert("批量删除成功！");
                            // 刷新列表
                            getBookList();
                        } else {
                            alert("批量删除失败！");
                        }
                    }
                });
            }
        }
    </script>
</body>
</html>
